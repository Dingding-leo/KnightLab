<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#090d13" />
  <title>KnightClub Browser Test Lab</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: #edf3ff; background: radial-gradient(circle at 15% 0%, #1f3e4a 0, transparent 32rem), linear-gradient(145deg, #080c12, #101924 56%, #090d13); }
    main { width: min(980px, calc(100% - 32px)); margin: 0 auto; padding: 54px 0 72px; }
    header { display: flex; justify-content: space-between; gap: 24px; align-items: flex-start; margin-bottom: 28px; }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 6vw, 4.6rem); letter-spacing: -0.055em; line-height: .95; }
    p { color: #aebdce; line-height: 1.65; }
    a { color: inherit; }
    .pill { display: inline-flex; gap: 8px; align-items: center; padding: 9px 13px; border: 1px solid #36505f; border-radius: 999px; background: #0b141dcc; color: #bfe9d4; font-size: 13px; }
    .panel { border: 1px solid #2a3b48; border-radius: 24px; background: #0b121bd9; box-shadow: 0 24px 90px #0008; overflow: hidden; }
    .toolbar { padding: 18px; display: flex; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid #263641; }
    button, .button { appearance: none; border: 0; border-radius: 13px; padding: 12px 16px; background: #98dc68; color: #10170d; font-weight: 800; cursor: pointer; text-decoration: none; }
    button.secondary, .button.secondary { background: #182531; color: #e7eef7; border: 1px solid #314553; }
    #summary { margin-left: auto; align-self: center; color: #aebdce; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .check { min-height: 120px; padding: 20px; border-right: 1px solid #22313b; border-bottom: 1px solid #22313b; }
    .check:nth-child(2n) { border-right: 0; }
    .row { display: flex; justify-content: space-between; gap: 16px; align-items: center; }
    .name { font-weight: 800; }
    .status { border-radius: 999px; padding: 5px 9px; font-size: 12px; font-weight: 800; background: #26333d; color: #c6d1dc; }
    .status.pass { background: #183424; color: #aaf0bd; }
    .status.fail { background: #421f25; color: #ffc1c8; }
    .detail { margin: 12px 0 0; font-size: 14px; color: #91a2b4; word-break: break-word; }
    footer { margin-top: 24px; display: flex; justify-content: space-between; gap: 18px; flex-wrap: wrap; color: #8191a3; font-size: 13px; }
    @media (max-width: 680px) { header { display: block; } .pill { margin-top: 16px; } .grid { grid-template-columns: 1fr; } .check, .check:nth-child(2n) { border-right: 0; } #summary { width: 100%; margin-left: 0; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>KnightClub<br />Test Lab</h1>
        <p>在本机验证网页版本所需的存储、离线、Worker、音频和 WebAssembly 能力。测试不上传任何数据。</p>
      </div>
      <span class="pill">● LOCAL · NO TELEMETRY</span>
    </header>

    <section class="panel">
      <div class="toolbar">
        <button id="run">重新运行测试</button>
        <button id="sound" class="secondary">播放原创测试音</button>
        <a class="button secondary" href="./">返回 KnightClub</a>
        <span id="summary">尚未运行</span>
      </div>
      <div id="results" class="grid"></div>
    </section>

    <footer>
      <span>KnightClub browser compatibility diagnostics</span>
      <span id="stamp"></span>
    </footer>
  </main>

  <script>
    const tests = [
      ['Secure context', () => [window.isSecureContext, location.protocol]],
      ['Local storage', () => { const k='knightclub-test'; localStorage.setItem(k,'ok'); const ok=localStorage.getItem(k)==='ok'; localStorage.removeItem(k); return [ok, 'read/write available']; }],
      ['IndexedDB', () => [Boolean(window.indexedDB), window.indexedDB ? 'available' : 'missing']],
      ['Web Worker', () => { if (!window.Worker) return [false,'missing']; const blob=new Blob(['postMessage("ok")'],{type:'text/javascript'}); const worker=new Worker(URL.createObjectURL(blob)); worker.terminate(); return [true,'constructible']; }],
      ['WebAssembly', () => [Boolean(window.WebAssembly), window.WebAssembly ? 'available' : 'missing']],
      ['Web Audio', () => [Boolean(window.AudioContext || window.webkitAudioContext), 'used for local cues']],
      ['Service Worker API', () => [Boolean(navigator.serviceWorker), navigator.serviceWorker ? 'available' : 'missing']],
      ['PWA manifest', async () => { const response=await fetch('./manifest.webmanifest',{cache:'no-store'}); return [response.ok, response.status+' '+response.statusText]; }],
      ['Offline worker file', async () => { const response=await fetch('./sw.js',{cache:'no-store'}); return [response.ok, response.status+' '+response.statusText]; }],
      ['KnightClub entry', async () => { const response=await fetch('./',{cache:'no-store'}); return [response.ok, response.status+' '+response.statusText]; }],
    ];

    async function run() {
      const root=document.querySelector('#results'); root.innerHTML=''; let passed=0;
      for (const [name, test] of tests) {
        let ok=false, detail='';
        try { [ok, detail]=await test(); } catch (error) { detail=error instanceof Error ? error.message : String(error); }
        passed += ok ? 1 : 0;
        const card=document.createElement('article'); card.className='check';
        card.innerHTML='<div class="row"><span class="name"></span><span class="status"></span></div><p class="detail"></p>';
        card.querySelector('.name').textContent=name;
        const status=card.querySelector('.status'); status.textContent=ok?'PASS':'FAIL'; status.classList.add(ok?'pass':'fail');
        card.querySelector('.detail').textContent=detail;
        root.append(card);
      }
      document.querySelector('#summary').textContent=`${passed}/${tests.length} 项通过`;
      document.querySelector('#stamp').textContent=new Date().toLocaleString();
    }

    document.querySelector('#run').addEventListener('click', run);
    document.querySelector('#sound').addEventListener('click', async () => {
      const AudioContext=window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const context=new AudioContext(); await context.resume();
      const gain=context.createGain(); gain.gain.setValueAtTime(.0001,context.currentTime); gain.gain.exponentialRampToValueAtTime(.16,context.currentTime+.015); gain.gain.exponentialRampToValueAtTime(.0001,context.currentTime+.32); gain.connect(context.destination);
      [392,523.25,659.25].forEach((frequency,index)=>{ const oscillator=context.createOscillator(); oscillator.type=index===0?'triangle':'sine'; oscillator.frequency.value=frequency; oscillator.connect(gain); oscillator.start(context.currentTime+index*.045); oscillator.stop(context.currentTime+.36); });
      setTimeout(()=>context.close(),500);
    });
    run();
  </script>
</body>
</html>
